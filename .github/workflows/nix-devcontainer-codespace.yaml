name: Nix Devcontainer Codespace

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build Dockerfile-nix-devcontainer-codespace
        run: docker build --build-arg GITHUB_TOKEN=${{ github.token }} -f Dockerfile-nix-devcontainer-codespace .
